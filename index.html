<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentSpeak</title>
  <link rel="stylesheet" href="css/main.css" />

</head>
<body class="theme-dark" data-font="standard" data-size="medium">
    <section id="screen-splash" class="screen active">

<h1 class="splash-title">SilentSpeak</h1>

<p class="splash-sub">
Classroom Communication Reimagined
</p>

<button onclick="App.showScreen('screen-role')">
Get Started
</button>

</section>

<section id="screen-role" class="screen">

<h2>Select Role</h2>

<button onclick="App.selectRole('teacher')">
Teacher
</button>

<button onclick="App.selectRole('student')">
Student
</button>

</section>
<textarea id="tts-input"></textarea>

<button onclick="App.speak()">
Speak
</button>

<h2>Live Teacher Caption</h2>

<button onclick="startRecognition()">Start Listening</button>

<p id="caption"></p>

</body>
</html>
